<br><span class="line">            res.<span class="built_in">push_back</span>(s[i] - <span class="string">&#x27;A&#x27;</span> + <span class="string">&#x27;a&#x27;</span>);</span><br><span class="line">            </span><br><span class="line">          <span class="comment">//第二种情况：输入 HTTPNameHTTP 或 HTTP</span></span><br><span class="line">          <span class="comment">//字符串开头和结尾都是大写的情况下，也只需要把该字符转换成小写就可以了</span></span><br><span class="line">        &#125; <span class="keyword">else</span> <span class="keyword">if</span> ((i == <span class="number">0</span> || i == s.<span class="built_in">size</span>() - <span class="number">1</span>) &amp;&amp; s[i] &gt;= <span class="string">&#x27;A&#x27;</span> &amp;&amp; s[i] &lt;= <span class="string">&#x27;Z&#x27;</span>) &#123;</span><br><span class="line">            </span><br><span class="line">            res.<span class="built_in">push_back</span>(s[i] - <span class="string">&#x27;A&#x27;</span> + <span class="string">&#x27;a&#x27;</span>);</span><br><span class="line">            </span><br><span class="line">          <span class="comment">//第三种情况：除了以上两种特殊情况，其他字符为大写的时候</span></span><br><span class="line">        &#125; <span class="keyword">else</span> <span class="keyword">if</span> (s[i] &gt;= <span class="string">&#x27;A&#x27;</span> &amp;&amp; s[i] &lt;= <span class="string">&#x27;Z&#x27;</span>) &#123;</span><br><span class="line">            </span><br><span class="line">            res.<span class="built_in">push_back</span>(<span class="string">&#x27;_&#x27;</span>);</span><br><span class="line">            res.<span class="built_in">push_back</span>(s[i] - <span class="string">&#x27;A&#x27;</span> + <span class="string">&#x27;a&#x27;</span>);</span><br><span class="line">            </span><br><span class="line">          <span class="comment">//第四种情况：字符为小写的时候</span></span><br><span class="line">        &#125; <span class="keyword">else</span> res.<span class="built_in">push_back</span>(s[i]);</span><br><span class="line">    &#125;</span><br><span class="line">    </span><br><span class="line">    <span class="keyword">return</span> res;  <span class="comment">//for循环结束后，返回res结果</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">//以下是测试代码：</span></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">test1</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    </span><br><span class="line">    string s, res;</span><br><span class="line">    </span><br><span class="line">    s = <span class="string">&quot;HTTP&quot;</span>;</span><br><span class="line">    </span><br><span class="line">    res = <span class="built_in">conversionString</span>(s);</span><br><span class="line">    cout &lt;&lt; <span class="string">&quot;输入：HTTP，输出：&quot;</span> &lt;&lt; res &lt;&lt; endl;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">test2</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    </span><br><span class="line">    string s, res;</span><br><span class="line">    </span><br><span class="line">    s = <span class="string">&quot;HTTPNameHTTP&quot;</span>;</span><br><span class="line">    </span><br><span class="line">    res = <span class="built_in">conversionString</span>(s);</span><br><span class="line">    cout &lt;&lt; <span class="string">&quot;输入：HTTPNameHTTP，输出：&quot;</span> &lt;&lt; res &lt;&lt; endl;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">test3</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    </span><br><span class="line">    string s, res;</span><br><span class="line">    </span>
